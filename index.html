<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Сила Бизнеса 2.0 — Зависит ли бизнес только от людей?</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1/dist/chart.umd.min.js"></script>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .result-card { transition: all 0.3s ease; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900">
  <div class="max-w-5xl mx-auto p-6">
    <div class="text-center mb-10">
      <h1 class="text-4xl font-bold text-indigo-700 mb-2">Сила Бизнеса 2.0</h1>
      <p class="text-xl text-gray-600">Насколько компания зависит от персонала?<br>Тест, вдохновлённый дискуссией с Raykhona Ibragimova</p>
    </div>

    <!-- Форма ввода -->
    <div class="bg-white rounded-2xl shadow-xl p-8 mb-10">
      <h2 class="text-2xl font-semibold mb-6">Введите данные компании</h2>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label class="block text-sm font-medium mb-1">Название компании</label>
          <input id="company" type="text" value="Walmart" class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:border-indigo-500">
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">Количество сотрудников</label>
          <input id="employees" type="number" value="2100000" class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:border-indigo-500">
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">Чистая прибыль (млрд USD)</label>
          <input id="profit" type="number" step="0.1" value="21.9" class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:border-indigo-500">
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">Выручка (млрд USD)</label>
          <input id="revenue" type="number" step="0.1" value="706" class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:border-indigo-500">
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">Затраты на персонал (% от выручки)</label>
          <input id="laborCost" type="number" step="0.1" value="21" class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:border-indigo-500">
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">Уровень автоматизации (% задач)</label>
          <input id="automation" type="range" min="0" max="100" value="35" class="w-full accent-indigo-600">
          <div class="text-center text-sm font-medium" id="automationValue">35%</div>
        </div>
      </div>

      <div class="mt-8 flex gap-4">
        <button onclick="analyze()" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-4 rounded-xl text-lg transition">Анализировать бизнес</button>
        <button onclick="loadExample(0)" class="flex-1 bg-white border border-gray-300 hover:bg-gray-50 font-semibold py-4 rounded-xl text-lg transition">Walmart</button>
        <button onclick="loadExample(1)" class="flex-1 bg-white border border-gray-300 hover:bg-gray-50 font-semibold py-4 rounded-xl text-lg transition">Amazon</button>
        <button onclick="loadExample(2)" class="flex-1 bg-white border border-gray-300 hover:bg-gray-50 font-semibold py-4 rounded-xl text-lg transition">CNPC</button>
      </div>
    </div>

    <!-- Результат -->
    <div id="result" class="hidden">
      <div class="bg-white rounded-2xl shadow-2xl p-8 result-card">
        <div id="verdict" class="text-3xl font-bold text-center mb-8 py-4 rounded-2xl"></div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
          <div class="bg-gray-50 p-6 rounded-xl text-center">
            <p class="text-sm text-gray-500">Зависимость от персонала</p>
            <p id="dependencyScore" class="text-5xl font-bold mt-2"></p>
          </div>
          <div class="bg-gray-50 p-6 rounded-xl text-center">
            <p class="text-sm text-gray-500">Прибыль на 1 сотрудника (USD)</p>
            <p id="profitPerEmployee" class="text-5xl font-bold mt-2"></p>
          </div>
          <div class="bg-gray-50 p-6 rounded-xl text-center">
            <p class="text-sm text-gray-500">Автоматизация</p>
            <p id="autoLevel" class="text-5xl font-bold mt-2"></p>
          </div>
        </div>

        <h3 class="text-xl font-semibold mb-4">Сравнение с гигантами</h3>
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead>
              <tr class="border-b">
                <th class="text-left py-3">Компания</th>
                <th class="text-right py-3">Сотрудников</th>
                <th class="text-right py-3">Прибыль (млрд $)</th>
                <th class="text-center py-3">Зависимость</th>
              </tr>
            </thead>
            <tbody id="comparisonTable"></tbody>
          </table>
        </div>

        <div class="mt-10">
          <canvas id="radarChart" height="120"></canvas>
        </div>

        <div id="criticalPoint" class="mt-10 p-6 bg-amber-50 border border-amber-200 rounded-2xl text-sm leading-relaxed"></div>

        <div class="mt-8 text-center">
          <button onclick="window.location.reload()" class="text-indigo-600 hover:text-indigo-700 font-medium">Новый расчёт →</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    function analyze() {
      const company = document.getElementById('company').value || 'Компания';
      const employees = parseFloat(document.getElementById('employees').value) || 0;
      const profit = parseFloat(document.getElementById('profit').value) || 0;
      const revenue = parseFloat(document.getElementById('revenue').value) || 1;
      const laborCost = parseFloat(document.getElementById('laborCost').value) || 15;
      const automation = parseFloat(document.getElementById('automation').value) || 30;

      const profitPerEmp = employees > 0 ? Math.round((profit * 1e9) / employees) : 0;
      const dependency = Math.min(100, Math.max(10, Math.round(laborCost * 2.5 + (100 - automation) * 0.6)));

      let verdictHTML = '';
      let color = '';
      if (dependency < 45) {
        verdictHTML = '🟢 Сильный независимый бизнес';
        color = 'bg-emerald-100 text-emerald-700';
      } else if (dependency < 70) {
        verdictHTML = '🟡 Зависит от людей, но управляемо';
        color = 'bg-amber-100 text-amber-700';
      } else {
        verdictHTML = '🔴 Критически зависит от персонала';
        color = 'bg-red-100 text-red-700';
      }

      document.getElementById('verdict').innerHTML = `<span class="${color} px-8 py-3 rounded-2xl">${verdictHTML}</span>`;
      document.getElementById('dependencyScore').textContent = dependency + '/100';
      document.getElementById('profitPerEmployee').textContent = profitPerEmp.toLocaleString('ru-RU');
      document.getElementById('autoLevel').textContent = automation + '%';

      // Таблица сравнения
      const examples = [
        {name: 'Walmart', emp: 2100000, prof: 21.9, dep: 87},
        {name: 'Amazon', emp: 1576000, prof: 77.7, dep: 68},
        {name: 'CNPC', emp: 1000000, prof: 25, dep: 52},
        {name: company, emp: employees, prof: profit, dep: dependency}
      ];

      let rows = '';
      examples.forEach(ex => {
        rows += `<tr class="border-b last:border-0">
          <td class="py-4 font-medium">${ex.name}</td>
          <td class="py-4 text-right">${(ex.emp/1000000).toFixed(1)} млн</td>
          <td class="py-4 text-right">${ex.prof}</td>
          <td class="py-4 text-center font-semibold">${ex.dep}/100</td>
        </tr>`;
      });
      document.getElementById('comparisonTable').innerHTML = rows;

      // Radar chart
      const ctx = document.getElementById('radarChart');
      if (window.myChart) window.myChart.destroy();
      window.myChart = new Chart(ctx, {
        type: 'radar',
        data: {
          labels: ['Независимость от людей', 'Автоматизация', 'Прибыль на сотрудника', 'Масштаб'],
          datasets: [{
            label: company,
            data: [100 - dependency, automation, Math.min(100, profitPerEmp / 50000), Math.min(100, employees / 20000)],
            backgroundColor: 'rgba(99, 102, 241, 0.2)',
            borderColor: '#6366f1',
            borderWidth: 3
          }]
        },
        options: { scales: { r: { min: 0, max: 100 } }, plugins: { legend: { display: false } } }
      });

      // Точка невозврата
      const criticalText = dependency > 75 
        ? `Критическая точка: если штат упадёт ниже <strong>75–80%</strong> от текущего уровня — маржа и продажи могут рухнуть необратимо. Рекомендация: ускорять автоматизацию и повышать зарплаты ключевым сотрудникам.`
        : `Бизнес относительно устойчив. Точка невозврата дальше, но следить за текучестью и автоматизацией всё равно нужно.`;

      document.getElementById('criticalPoint').innerHTML = `<strong>Точка невозврата:</strong><br>${criticalText}`;

      document.getElementById('result').classList.remove('hidden');
      document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
    }

    function loadExample(n) {
      const presets = [
        {company: 'Walmart', employees: 2100000, profit: 21.9, revenue: 706, laborCost: 21, automation: 35},
        {company: 'Amazon', employees: 1576000, profit: 77.7, revenue: 638, laborCost: 15, automation: 65},
        {company: 'CNPC', employees: 1000000, profit: 25, revenue: 450, laborCost: 7, automation: 45}
      ];
      const p = presets[n];
      document.getElementById('company').value = p.company;
      document.getElementById('employees').value = p.employees;
      document.getElementById('profit').value = p.profit;
      document.getElementById('revenue').value = p.revenue;
      document.getElementById('laborCost').value = p.laborCost;
      document.getElementById('automation').value = p.automation;
      document.getElementById('automationValue').textContent = p.automation + '%';
      analyze();
    }

    // Обновление значения ползунка
    document.getElementById('automation').addEventListener('input', function() {
      document.getElementById('automationValue').textContent = this.value + '%';
    });

    // Авто-анализ при загрузке (Walmart)
    window.onload = () => {
      setTimeout(() => {
        analyze();
      }, 300);
    };
  </script>
</body>
</html>
